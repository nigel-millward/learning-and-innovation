version: 2

# Group 7 — Time-Series & Temporal transformations. Each model is
# self-documented in-SQL; this file registers the models for parse/test only.

models:
  - name: resampling
    description: "Downsampling events to a regular hourly grid via DATE_TRUNC."
  - name: timezone_normalisation
    description: "Normalising timestamps to UTC with CONVERT_TIMEZONE."
  - name: rolling_window_metrics
    description: "7-day trailing moving average over a time-ordered window frame."
  - name: date_spine_gap_filling
    description: "Generated date spine with zero-fill and forward-fill (LOCF) of gaps."
  - name: sessionisation
    description: "Grouping events into sessions on an inactivity gap (gap-and-islands)."
