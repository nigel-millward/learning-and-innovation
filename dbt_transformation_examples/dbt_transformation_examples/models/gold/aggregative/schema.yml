version: 2

# Group 4 — Aggregative & Multi-Row transformations. Each model is
# self-documented in-SQL; this file registers the models for parse/test only.

models:
  - name: grouped_aggregations
    description: "GROUP BY summary statistics at a day/dimension grain."
  - name: global_aggregations
    description: "Dataset-wide single-row summary (no GROUP BY)."
  - name: window_functions
    description: "Row-preserving calculations over partitions (rank, running total, LAG)."
  - name: subtotals_grouping_sets
    description: "Multi-grain subtotals and grand total in one pass via ROLLUP."
  - name: statistical_aggregations
    description: "Distribution stats: MEDIAN, STDDEV, PERCENTILE_CONT, MODE, APPROX_COUNT_DISTINCT."
  - name: deduplication
    description: "One row per key via QUALIFY ROW_NUMBER()."
    columns:
      - name: EVENT_ID
        tests:
          - not_null
