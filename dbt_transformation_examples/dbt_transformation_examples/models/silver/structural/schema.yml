version: 2

# Group 1 — Structural transformations. Each model is self-documented in-SQL
# (header block describing the transformation and when to use it). This file
# registers the models so dbt parses them; full explanations live in the model
# files, not here.

models:
  - name: projection
    description: "Projection: explicit SELECT list to choose, drop and order columns."
  - name: renaming_aliasing
    description: "Renaming & aliasing columns/tables to a standardised vocabulary."
  - name: type_casting
    description: "Type casting with strict CAST and safe TRY_CAST coercion."
  - name: pivoting
    description: "Pivoting long -> wide via conditional aggregation."
  - name: unpivoting
    description: "Unpivoting wide -> long via UNION ALL."
  - name: unnesting_flattening
    description: "Unnesting an array column into rows with LATERAL FLATTEN."
  - name: nesting_structuring
    description: "Nesting rows/columns into VARIANT via OBJECT_CONSTRUCT / ARRAY_AGG."
  - name: json_parsing
    description: "Parsing a VARIANT payload: colon paths, GET_PATH, indexing and typed casts."
