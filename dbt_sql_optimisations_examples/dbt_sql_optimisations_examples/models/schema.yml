version: 2

# Each model is self-documented in-SQL (header block + inline comment on the
# optimised line). This file registers the models so dbt parses them and so a
# few key columns carry basic tests; full technique explanations live in the
# model files, not here.

models:
  # --- silver ---
  - name: predicate_pushdown
    description: "Predicate pushdown via an early filter in the first CTE of a multi-CTE model."
  - name: projection_pushdown
    description: "Projection pushdown: explicit column list instead of SELECT *."
  - name: qualify_dedup
    description: "Deduplication with QUALIFY ROW_NUMBER(), avoiding a secondary WHERE scan."
    columns:
      - name: EVENT_ID
        tests:
          - not_null
  - name: materialization_choice
    description: "Choosing view/ephemeral over table for a light, infrequently-read transform."
  - name: lateral_flatten
    description: "LATERAL FLATTEN to unnest TAGS_ARRAY in one pass instead of heavy joins."
  - name: result_cache
    description: "Deterministic SQL (no CURRENT_DATE/TIMESTAMP/RANDOM) to reuse the 24h result cache."
  - name: surrogate_key_hashing
    description: "MD5_BINARY surrogate key (16-byte) built then used as a join key."
  - name: approx_count_distinct
    description: "APPROX_COUNT_DISTINCT (HyperLogLog) for cheap uniques instead of exact COUNT(DISTINCT)."
  - name: union_all_vs_union
    description: "UNION ALL over disjoint branches to skip UNION's de-duplication sort."
  - name: general_recommendations
    description: "Minor always-on habits in one model: no ORDER BY in non-final models, GROUP BY ALL, tight window frames, LIMIT for exploration, warm warehouse cache."

  # --- gold ---
  - name: clustering_keys
    description: "Clustering a large table on EVENT_DAY/SITE_ID to improve read-time pruning."
  - name: incremental_models
    description: "Incremental merge model that processes only new source rows each run."
    columns:
      - name: event_day_site
        tests:
          - not_null
          - unique
  - name: early_aggregation_filtering
    description: "Filter and pre-aggregate in CTEs before joining to shrink the join input."
  - name: search_optimization
    description: "Search Optimization Service post-hook for point-lookups on VISITOR_ID."
  - name: query_acceleration
    description: "Scan-heavy aggregate; warehouse-level QAS enablement shown as reference SQL."
  - name: auto_ingest_pipe
    description: "Ideal target structure for COPY INTO/Snowpipe with file-size guidance (reference SQL)."
  - name: transient_tables
    description: "Transient table (transient=true) to drop Fail-safe storage cost on a reproducible aggregate."
  - name: warehouse_sizing
    description: "Warehouse sizing, auto-suspend/resume and multi-cluster guidance shown as reference SQL."
